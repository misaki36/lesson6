<!DOCTYPE html>
<!-- ↑ 「これはHTMLファイルです」とブラウザに伝える宣言 -->

<html lang="ja">
<!-- ↑ HTMLの始まり。lang="ja" は日本語のページであることを示す -->

<head>
  <!-- head の中は「設定情報」。ブラウザには表示されない -->
  <meta charset="UTF-8">
  <!-- ↑ 文字コードの指定。日本語を正しく表示するために必要 -->

  <title>自己紹介</title>
  <!-- ↑ ブラウザのタブに表示されるタイトル -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

  <style>
    html,
    body {
      min-height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Noto Sans JP', sans-serif;
      color: #1f2937;
      background: linear-gradient(135deg, #0b3d91 0%, #82cfff 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
      padding: 40px;
      animation: fadeInUp 0.8s ease both;
    }

    .card h1 {
      font-size: 3rem;
      font-weight: 700;
      margin: 0 0 18px;
      line-height: 1.1;
    }

    .card p {
      margin: 0 0 24px;
      color: #475569;
      font-size: 1.05rem;
      line-height: 1.8;
    }

    .skills {
      margin-bottom: 32px;
    }

    .skills h2 {
      margin: 0 0 18px;
      font-size: 1.5rem;
      font-weight: 700;
      color: #0b3d91;
    }

    .skill-item {
      margin-bottom: 18px;
    }

    .skill-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-weight: 700;
      color: #334155;
    }

    .skill-bar {
      width: 100%;
      height: 14px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
    }

    .skill-fill {
      height: 100%;
      border-radius: 999px;
      transform-origin: left;
      transform: scaleX(0);
      animation: growBar 0.8s ease forwards;
      background: linear-gradient(90deg, #0b3d91 0%, #82cfff 100%);
    }

    .skill-fill.html-css {
      width: 40%;
      animation-delay: 0.1s;
    }

    .skill-fill.js {
      width: 20%;
      animation-delay: 0.2s;
    }

    .skill-fill.ai {
      width: 80%;
      animation-delay: 0.3s;
    }

    .card ul {
      margin: 0;
      padding: 0;
      list-style: none;
      color: #475569;
    }

    .card li {
      margin-bottom: 12px;
      background: #f1f8ff;
      border-radius: 14px;
      padding: 14px 18px;
      transition: background-color 0.3s ease;
      cursor: pointer;
    }

    .card li:hover {
      background: #dbefff;
    }

    .card a {
      display: inline-block;
      margin-top: 24px;
      color: #0b3d91;
      text-decoration: none;
      font-weight: 700;
    }

    @keyframes growBar {
      from {
        transform: scaleX(0);
      }
      to {
        transform: scaleX(1);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card img {
      width: 100%;
      height: auto;
      border-radius: 12px;
      margin-bottom: 24px;
    }

    footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #e2e8f0;
      font-size: 0.9rem;
      color: #64748b;
    }
  </style>

<body>
  <!-- body の中に「表示したい内容」を書く -->

  <section class="card">
    <h1>桑本美咲</h1>
    <!-- ↑ 名前の見出し -->

    <p>こんにちは！プログラミングを学習中です。</p>
    <!-- ↑ 自己紹介文 -->

    <ul>
      <li>趣味: 読書</li>
      <li>趣味: 音楽</li>
      <li>趣味: 旅行</li>
      <li>趣味: お菓子作り</li>
      <li>趣味: ショッピング</li>
      <li>趣味: 自宅周りで美味しい食べ物を探す</li>
    </ul>
<img src="img.PNG" alt="ハリポタの写真">


    <section class="skills">
      <h2>スキル</h2>

      <div class="skill-item">
        <div class="skill-label"><span>HTML/CSS</span><span>40%</span></div>
        <div class="skill-bar"><div class="skill-fill html-css"></div></div>
      </div>

      <div class="skill-item">
        <div class="skill-label"><span>JavaScript</span><span>20%</span></div>
        <div class="skill-bar"><div class="skill-fill js"></div></div>
      </div>

      <div class="skill-item">
        <div class="skill-label"><span>AI活用</span><span>80%</span></div>
        <div class="skill-bar"><div class="skill-fill ai"></div></div>
      </div>
    </section>

    <a href="https://www.google.com" target="_blank" rel="noopener noreferrer">Googleを開く</a>

    <footer>
      © 2025 桑本みさき
    </footer>
  </section>
</body>
<!-- ↑ HTMLの終わり -->
</html>
